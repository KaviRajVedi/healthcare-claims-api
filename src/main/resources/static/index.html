<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Healthcare Claims Tracker</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="app-header">
    <div>
        <p class="eyebrow">Healthcare Claims API</p>
        <h1>Patient Claims Tracker</h1>
    </div>
    <button id="refreshButton" type="button">Refresh</button>
</header>

<main class="layout">
    <section class="panel summary-panel">
        <div class="section-heading">
            <h2>Claims Summary</h2>
            <span id="summaryCount">0 statuses</span>
        </div>
        <div id="summaryGrid" class="summary-grid"></div>
    </section>

    <section class="panel">
        <div class="section-heading">
            <h2>Patients</h2>
            <span id="patientCount">0 patients</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="patientsTable"></tbody>
            </table>
        </div>
    </section>

    <section class="split">
        <div class="panel">
            <div class="section-heading">
                <h2 id="claimsTitle">Patient Claims</h2>
                <span id="claimsCount">Select a patient</span>
            </div>
            <div id="claimsList" class="claims-list empty-state">
                Select a patient to view claims.
            </div>
        </div>

        <div class="panel">
            <div class="section-heading">
                <h2>Create Patient</h2>
                <span>Add patient details</span>
            </div>
            <form id="patientForm" class="form">
                <label>
                    Name
                    <input id="patientName" type="text" placeholder="John Doe" required>
                </label>
                <label>
                    Age
                    <input id="patientAge" type="number" min="0" max="130" placeholder="45" required>
                </label>
                <label>
                    Status
                    <select id="patientStatus" required>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </label>
                <button type="submit">Create Patient</button>
                <p id="patientFormMessage" class="form-message"></p>
            </form>
        </div>

        <div class="panel">
            <div class="section-heading">
                <h2>Create Claim</h2>
                <span>New claims start as SUBMITTED</span>
            </div>
            <form id="claimForm" class="form">
                <label>
                    Patient
                    <select id="patientSelect" required></select>
                </label>
                <label>
                    Claim Amount
                    <input id="claimAmount" type="number" min="0.01" step="0.01" placeholder="1250.75" required>
                </label>
                <button type="submit">Create Claim</button>
                <p id="formMessage" class="form-message"></p>
            </form>
        </div>
    </section>
</main>

<script src="/app.js"></script>
</body>
</html>
